spring.application.name=fumetteria

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/comicStore}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init
spring.sql.init.mode=always

# Logging
logging.file.name=logs/application.log
logging.pattern.console=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.pattern.file=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.level.root=INFO
logging.level.it.apuliadigital=DEBUG

# Swagger / SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false

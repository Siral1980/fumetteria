spring.application.name=fumetteria

# Database
spring.datasource.url=jdbc:h2:mem:comicStore
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init
spring.sql.init.mode=never

# Logging
logging.file.name=logs/application.log
logging.pattern.console=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.pattern.file=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.level.root=INFO
logging.level.it.apuliadigital=DEBUG

# Swagger / SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false

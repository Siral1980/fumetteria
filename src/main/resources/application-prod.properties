spring.application.name=fumetteria
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
logging.file.name=/var/log/fumetteria/application.log
logging.pattern.console=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.pattern.file=%d{HH:mm:ss} --- [%t] %-40logger{36} : %msg%n
logging.level.root=WARN
logging.level.it.apuliadigital=INFO
spring.jpa.properties.hibernate.format_sql=false
